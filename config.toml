baseURL = 'https://tanayjha-blog.vercel.app/'
languageCode = 'en-us'
title = 'My Musings'
theme = "PaperMod"
enableRobotsTXT = true
ignoreFiles = ["content/blogold/.*"]
ignoreLogs = ["warning-partial-superfluous-prefix"]

[pagination]
pagerSize = 8

[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
tag = "tags"
category = "categories"

[params]
description = "Notes on distributed systems, algorithms, math, networking, security, books, and software engineering."
keywords = ["software engineering", "distributed systems", "algorithms", "math", "networking", "security"]
author = "Tanay Jha"
mainSections = ["blog"]
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
ShowRssButtonInSectionTermList = true
ShowPageNums = true
ShowWordCount = false
ShowFullTextinRSS = false
comments = true

[params.engagement]
enabled = false
apiBaseUrl = "http://localhost:7071/api"
enableLikes = true
enableComments = true
enableViews = true

[params.cover]
linkFullImages = true
responsiveImages = true

[params.assets]
favicon = "favicon.svg"
favicon16x16 = "favicon.svg"
favicon32x32 = "favicon.svg"
apple_touch_icon = "favicon.svg"
safari_pinned_tab = "favicon.svg"
theme_color = "#faf9f6"
msapplication_TileColor = "#faf9f6"

[params.profileMode]
enabled = true
title = 'My Tryst With CS'
subtitle = "Notes on distributed systems, algorithms, math, networking, security, books, and the ideas I want to understand deeply."
imageUrl = "images/blogPic.jpeg"
imageTitle = "Me"
imageWidth = 120
imageHeight = 120

[[params.profileMode.buttons]]
  name = "Blog"
  url = "/blog"

[[params.profileMode.buttons]]
  name = "Archive"
  url = "/archives"

[[params.profileMode.buttons]]
  name = "Tags"
  url = "/tags"

[[params.profileMode.buttons]]
  name = "Search"
  url = "/search"

[[params.profileMode.buttons]]
  name = "Main Site"
  url = "https://tanayjha.github.io"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/tanayjha"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/tanayjha/"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "Archive"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "main-site"
  name = "Main Site"
  url = "https://tanayjha.github.io"
  weight = 50

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content", "tags"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
