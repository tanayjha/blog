<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">Two cases in the proof that K6 forces a monochromatic triangle</title>
  <desc id="desc">After choosing a vertex v with three blue incident edges to a, b, and c, either one edge among a, b, c is blue giving a blue triangle with v, or all three are red giving a red triangle among a, b, c.</desc>
  <defs>
    <style>
      .label { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
      .small { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #444; }
      .vertex { fill: #fff; stroke: #222; stroke-width: 2.5; }
      .blue { stroke: #2368d9; stroke-width: 5; stroke-linecap: round; }
      .red { stroke: #d33f49; stroke-width: 5; stroke-linecap: round; }
      .gray { stroke: #c7c7c7; stroke-width: 3; stroke-dasharray: 6 7; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="900" height="380" fill="#fff"/>
  <text x="450" y="34" class="label" text-anchor="middle">After picking v, three incident edges have the same color</text>

  <g transform="translate(20, 45)">
    <text x="205" y="30" class="label" text-anchor="middle">Case 1: one edge among a, b, c is blue</text>
    <polygon points="90,165 285,75 345,165" fill="#2368d9" opacity="0.12"/>
    <line x1="90" y1="165" x2="285" y2="75" class="blue"/>
    <line x1="90" y1="165" x2="345" y2="165" class="blue"/>
    <line x1="90" y1="165" x2="285" y2="255" class="blue"/>
    <line x1="285" y1="75" x2="345" y2="165" class="blue"/>
    <line x1="345" y1="165" x2="285" y2="255" class="gray"/>
    <line x1="285" y1="75" x2="285" y2="255" class="gray"/>

    <circle cx="90" cy="165" r="18" class="vertex"/>
    <circle cx="285" cy="75" r="18" class="vertex"/>
    <circle cx="345" cy="165" r="18" class="vertex"/>
    <circle cx="285" cy="255" r="18" class="vertex"/>
    <text x="90" y="171" class="label" text-anchor="middle">v</text>
    <text x="285" y="81" class="label" text-anchor="middle">a</text>
    <text x="345" y="171" class="label" text-anchor="middle">b</text>
    <text x="285" y="261" class="label" text-anchor="middle">c</text>
    <text x="190" y="315" class="small" text-anchor="middle">v, a, b form a blue K3</text>
  </g>

  <line x1="450" y1="65" x2="450" y2="350" stroke="#e0e0e0" stroke-width="2"/>

  <g transform="translate(470, 45)">
    <text x="205" y="30" class="label" text-anchor="middle">Case 2: no edge among a, b, c is blue</text>
    <polygon points="285,75 345,165 285,255" fill="#d33f49" opacity="0.12"/>
    <line x1="90" y1="165" x2="285" y2="75" class="blue"/>
    <line x1="90" y1="165" x2="345" y2="165" class="blue"/>
    <line x1="90" y1="165" x2="285" y2="255" class="blue"/>
    <line x1="285" y1="75" x2="345" y2="165" class="red"/>
    <line x1="345" y1="165" x2="285" y2="255" class="red"/>
    <line x1="285" y1="75" x2="285" y2="255" class="red"/>

    <circle cx="90" cy="165" r="18" class="vertex"/>
    <circle cx="285" cy="75" r="18" class="vertex"/>
    <circle cx="345" cy="165" r="18" class="vertex"/>
    <circle cx="285" cy="255" r="18" class="vertex"/>
    <text x="90" y="171" class="label" text-anchor="middle">v</text>
    <text x="285" y="81" class="label" text-anchor="middle">a</text>
    <text x="345" y="171" class="label" text-anchor="middle">b</text>
    <text x="285" y="261" class="label" text-anchor="middle">c</text>
    <text x="190" y="315" class="small" text-anchor="middle">a, b, c form a red K3</text>
  </g>
</svg>
