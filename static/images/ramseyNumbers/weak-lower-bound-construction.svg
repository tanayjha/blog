<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">The weak lower bound construction for Ramsey numbers</title>
  <desc id="desc">Vertices are arranged in m minus 1 rows and n minus 1 columns. Edges within a row are blue, and edges between different rows are red.</desc>
  <defs>
    <style>
      .label { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
      .small { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #444; }
      .vertex { fill: #fff; stroke: #222; stroke-width: 2.5; }
      .blue { stroke: #2368d9; stroke-width: 4; stroke-linecap: round; }
      .red { stroke: #d33f49; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 7 7; opacity: 0.75; }
      .rowbox { fill: #2368d9; opacity: 0.06; stroke: #2368d9; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="860" height="430" fill="#fff"/>
  <text x="430" y="36" class="label" text-anchor="middle">Construction for r(n, m) >= (n - 1)(m - 1) + 1</text>
  <text x="430" y="62" class="small" text-anchor="middle">m - 1 rows, n - 1 vertices in each row</text>

  <g transform="translate(120, 92)">
    <rect x="35" y="18" width="305" height="50" rx="12" class="rowbox"/>
    <rect x="35" y="118" width="305" height="50" rx="12" class="rowbox"/>
    <rect x="35" y="218" width="305" height="50" rx="12" class="rowbox"/>

    <line x1="70" y1="43" x2="160" y2="43" class="blue"/>
    <line x1="70" y1="43" x2="250" y2="43" class="blue"/>
    <line x1="70" y1="43" x2="310" y2="43" class="blue"/>
    <line x1="160" y1="43" x2="250" y2="43" class="blue"/>
    <line x1="160" y1="43" x2="310" y2="43" class="blue"/>
    <line x1="250" y1="43" x2="310" y2="43" class="blue"/>

    <line x1="70" y1="143" x2="160" y2="143" class="blue"/>
    <line x1="70" y1="143" x2="250" y2="143" class="blue"/>
    <line x1="70" y1="143" x2="310" y2="143" class="blue"/>
    <line x1="160" y1="143" x2="250" y2="143" class="blue"/>
    <line x1="160" y1="143" x2="310" y2="143" class="blue"/>
    <line x1="250" y1="143" x2="310" y2="143" class="blue"/>

    <line x1="70" y1="243" x2="160" y2="243" class="blue"/>
    <line x1="70" y1="243" x2="250" y2="243" class="blue"/>
    <line x1="70" y1="243" x2="310" y2="243" class="blue"/>
    <line x1="160" y1="243" x2="250" y2="243" class="blue"/>
    <line x1="160" y1="243" x2="310" y2="243" class="blue"/>
    <line x1="250" y1="243" x2="310" y2="243" class="blue"/>

    <line x1="70" y1="43" x2="70" y2="143" class="red"/>
    <line x1="160" y1="43" x2="250" y2="143" class="red"/>
    <line x1="310" y1="43" x2="160" y2="143" class="red"/>
    <line x1="70" y1="143" x2="310" y2="243" class="red"/>
    <line x1="250" y1="143" x2="70" y2="243" class="red"/>
    <line x1="310" y1="143" x2="310" y2="243" class="red"/>

    <g>
      <circle cx="70" cy="43" r="14" class="vertex"/>
      <circle cx="160" cy="43" r="14" class="vertex"/>
      <circle cx="250" cy="43" r="14" class="vertex"/>
      <circle cx="310" cy="43" r="14" class="vertex"/>
      <circle cx="70" cy="143" r="14" class="vertex"/>
      <circle cx="160" cy="143" r="14" class="vertex"/>
      <circle cx="250" cy="143" r="14" class="vertex"/>
      <circle cx="310" cy="143" r="14" class="vertex"/>
      <circle cx="70" cy="243" r="14" class="vertex"/>
      <circle cx="160" cy="243" r="14" class="vertex"/>
      <circle cx="250" cy="243" r="14" class="vertex"/>
      <circle cx="310" cy="243" r="14" class="vertex"/>
    </g>

    <text x="470" y="48" class="small">Blue edges are inside each row</text>
    <text x="470" y="88" class="small">Each row has only n - 1 vertices,</text>
    <text x="470" y="110" class="small">so there is no blue K_n.</text>
    <text x="470" y="178" class="small">All cross-row edges are red.</text>
    <text x="470" y="218" class="small">There are only m - 1 rows,</text>
    <text x="470" y="240" class="small">so there is no red K_m.</text>
  </g>
</svg>
